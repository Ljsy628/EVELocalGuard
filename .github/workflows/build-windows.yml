name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build normal EXE
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name EVELocalGuard eve_local_guard.py

      - name: Build debug EXE
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --console --name EVELocalGuardDebug eve_local_guard.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EVELocalGuard-windows
          path: |
            dist/EVELocalGuard.exe
            dist/EVELocalGuardDebug.exe
          if-no-files-found: error

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: EVELocalGuard Latest
          body: Windows build generated by GitHub Actions.
          make_latest: true
          files: |
            dist/EVELocalGuard.exe
            dist/EVELocalGuardDebug.exe
